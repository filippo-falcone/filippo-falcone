name: Aggiorna badge statistiche README

on:
  schedule:
    - cron: "0 3 * * *" # Ogni giorno alle 3:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Genera badge da GitHub API (ZERO CACHE)
        run: |
          mkdir -p assets
          
          GITHUB_TOKEN="${{ github.token }}"
          TIMESTAMP=$(date +%s)
          
          echo "📡 Fetching dati da GitHub API direttamente..."
          
          # 1️⃣ GITHUB STATS - Usa l'API REST di GitHub
          echo "🔄 Generando GitHub Stats..."
          STATS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/users/filippo-falcone)
          
          PUBLIC_REPOS=$(echo "$STATS" | grep -o '"public_repos":[0-9]*' | cut -d: -f2)
          FOLLOWERS=$(echo "$STATS" | grep -o '"followers":[0-9]*' | cut -d: -f2)
          
          cat > assets/github-stats.svg << 'STATSEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="500" height="195">
            <defs>
              <style>
                .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fe428e; }
                .stat-label { font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a9fef7; }
                .stat-value { font: 600 20px 'Segoe UI', Ubuntu, Sans-Serif; fill: #79ff97; }
              </style>
            </defs>
            <rect width="500" height="195" rx="4.5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
            <text x="25" y="35" class="header">📊 GitHub Statistics</text>
            <text x="60" y="90" class="stat-value">STATSEOF
          echo "$PUBLIC_REPOS" >> assets/github-stats.svg
          cat >> assets/github-stats.svg << 'STATSEOF2'
          </text>
            <text x="60" y="115" class="stat-label">Repository Pubblici</text>
            <text x="280" y="90" class="stat-value">STATSEOF2
          echo "$FOLLOWERS" >> assets/github-stats.svg
          cat >> assets/github-stats.svg << 'STATSEOF3'
          </text>
            <text x="280" y="115" class="stat-label">Followers</text>
            <text x="25" y="160" class="stat-label">⏰ Aggiornato: STATSEOF3
          date '+%d/%m/%Y %H:%M UTC' >> assets/github-stats.svg
          cat >> assets/github-stats.svg << 'STATSEND'
          </text>
          </svg>
          STATSEND
          
          echo "✅ GitHub Stats generato"
          
          # 2️⃣ TOP LANGUAGES - Analizza i repository pubblici
          # Include ALL repos per mostrare Python correttamente
          echo "🔄 Generando Top Languages..."
          
          LANGUAGES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/users/filippo-falcone/repos?per_page=100&sort=updated" | \
            grep -o '"language":"[^"]*"' | cut -d'"' -f4 | sort | uniq -c | sort -rn | head -5)
          
          cat > assets/top-langs.svg << 'LANGSEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="500" height="195">
            <defs>
              <style>
                .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fe428e; }
                .lang-item { font: 600 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #79ff97; }
              </style>
            </defs>
            <rect width="500" height="195" rx="4.5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
            <text x="25" y="35" class="header">💻 Top Languages</text>
            <text x="40" y="75" class="lang-item">LANGSEOF
          
          echo "$LANGUAGES" | awk '{print $2 " (" $1 " repos)"}' | head -1 >> assets/top-langs.svg
          
          cat >> assets/top-langs.svg << 'LANGSEOF2'
          </text>
          LANGSEOF2
          
          # Aggiungi ultime 4 lingue
          local_line=105
          echo "$LANGUAGES" | tail -n +2 | while IFS= read -r line; do
            echo "            <text x=\"40\" y=\"$local_line\" class=\"lang-item\">$line</text>" >> assets/top-langs.svg
            local_line=$((local_line + 25))
          done
          
          cat >> assets/top-langs.svg << 'LANGSEND'
          </svg>
          LANGSEND
          
          echo "✅ Top Languages generato"
          
          # 3️⃣ STREAK STATS - Calcola da contributions endpoint
          # GitHub non ha un API pubblico per lo streak, ma usiamo i dati di ultima attività
          echo "🔄 Generando Streak Stats..."
          
          LAST_YEAR=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/users/filippo-falcone/repos?per_page=100&sort=updated" | \
            grep -o '"updated_at":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          LAST_COMMIT_DATE=$(date -d "$LAST_YEAR" +%s 2>/dev/null || echo "0")
          TODAY=$(date +%s)
          DAYS_SINCE=$((($TODAY - $LAST_COMMIT_DATE) / 86400))
          
          cat > assets/streak.svg << 'STREAKEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="495" height="195">
            <defs>
              <style>
                .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #fe428e; }
                .stat-label { font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a9fef7; }
                .stat-value { font: 600 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
                .date-text { font: 600 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #79ff97; }
              </style>
            </defs>
            <rect width="495" height="195" rx="4.5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
            <text x="25" y="35" class="header">🔥 GitHub Activity (LIVE DATA)</text>
            <text x="60" y="100" class="stat-value">STREAKEOF
          echo "$DAYS_SINCE" >> assets/streak.svg
          cat >> assets/streak.svg << 'STREAKEOF2'
          </text>
            <text x="60" y="125" class="stat-label">Giorni dall'ultimo commit</text>
            <text x="25" y="160" class="date-text">🕐 Dati acquisiti direttamente da GitHub API STREAKEOF2
          date '+%d %b %Y, %H:%M UTC' >> assets/streak.svg
          cat >> assets/streak.svg << 'STREAKEND'
          </text>
          </svg>
          STREAKEND
          
          echo "✅ Streak Stats generato"
          echo "✨ Tutti i badge generati con GitHub API diretta (ZERO CACHE)"

      - name: Commit e push immagini aggiornate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Verifica quali file sono stati aggiornati
          updated_files=""
          for file in "assets/github-stats.svg" "assets/top-langs.svg" "assets/streak.svg"; do
            if [ -s "$file" ]; then
              updated_files="$updated_files $(basename $file)"
            fi
          done

          git add assets/

          if git diff --staged --quiet; then
            echo "📝 Nessuna modifica alle statistiche"
          else
            # Crea un messaggio di commit informativo
            commit_message="🤖 Aggiorna badge statistiche README [auto]"
            if [ ! -z "$updated_files" ]; then
              commit_message="$commit_message - Aggiornati:$updated_files"
            fi
            
            git commit -m "$commit_message"
            
            # Retry del push se fallisce
            max_push_attempts=3
            push_attempt=1
            while [ $push_attempt -le $max_push_attempts ]; do
              echo "🚀 Tentativo push $push_attempt..."
              if git push origin main; then
                echo "✅ Push completato con successo!"
                break
              else
                echo "❌ Push fallito, ritento..."
                push_attempt=$((push_attempt + 1))
                [ $push_attempt -le $max_push_attempts ] && sleep 5
              fi
            done
            
            if [ $push_attempt -gt $max_push_attempts ]; then
              echo "❌ Push fallito dopo $max_push_attempts tentativi"
              exit 1
            fi
          fi
