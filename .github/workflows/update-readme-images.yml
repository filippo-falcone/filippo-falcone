name: Aggiorna immagini README

# WORKFLOW IN PAUSA - Vercel deployment è paused
# Attivare decommentando la sezione 'on:' quando Vercel torna online
#
# on:
#   schedule:
#     # Esegui ogni giorno alle 2:00 UTC
#     - cron: "0 2 * * *"
#   workflow_dispatch:

permissions:
  contents: write

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download Tex Converter card
        run: |
          curl -L -o assets/tex-converter-card.svg \
            'https://github-readme-stats.vercel.app/api/pin/?username=filippo-falcone&repo=tex-converter&theme=github_dark'
          echo "=== Tex Converter Card Content ===" 
          head -c 100 assets/tex-converter-card.svg

      - name: Download Boolflix card
        run: |
          curl -L -o assets/boolflix-card.svg \
            'https://github-readme-stats.vercel.app/api/pin/?username=filippo-falcone&repo=vite-boolflix&theme=github_dark'
          echo "=== Boolflix Card Content ===" 
          head -c 100 assets/boolflix-card.svg

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/*.svg
          git commit -m "chore: update readme card images" || echo "No changes to commit"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push
